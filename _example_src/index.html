<!DOCTYPE html>
<html>
  <head>
    <title>pubviz - pubviz</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@viz-js/viz@3.25.0/dist/viz-global.js"></script>
    <script defer src="web_app.dart.js"></script>
  </head>
  <body>
    <div id="app-layout">
      <button id="hamburgerBtn" title="Toggle Controls (c)">&#9776;</button>
      <div id="controls-panel" class="collapsed">
        <div id="controls-header">
          <span id="controls-title">Controls (c)</span>
        </div>
        <div id="controls-content">
          <label>
            <input type="checkbox" id="zoomCheckbox"> Zoom (z)
          </label>
          <label>
            <input type="checkbox" id="devDependenciesCheckbox" checked> Dev Dependencies (d)
          </label>
          <label id="outdatedCheckboxContainer">
            <input type="checkbox" id="outdatedOnlyCheckbox"> Outdated Only (o)
          </label>
        </div>
        <div id="controls-footer">
          <a href="https://pub.dev/packages/pubviz" target="_blank" rel="noopener noreferrer">package:pubviz</a>
          <span id="version">vXYZ</span>
        </div>
      </div>
      <div id="graph-wrapper">
        <div id="deps-in-box" class="hud-box" style="display: none;"></div>
        <div id="deps-out-box" class="hud-box" style="display: none;"></div>
        <div id="graph-container"></div>
      </div>
    </div>
  </body>
</html>
