# See https://github.com/dart-lang/build/tree/master/build_web_compilers#configuration
targets:
  $default:
    sources:
      - _example_src/**
      - $package$
      - build.yaml
      - lib/$lib$
      - lib/src/colors.dart
      - lib/src/dependency.*
      - lib/src/dot.dart
      - lib/src/options.*
      - lib/src/viz_package.*
      - lib/src/viz_root.*
      - pubspec.*
    builders:
      build_cli:
        generate_for:
        - lib/src/options.*
      json_serializable:
        generate_for:
        - lib/src/viz_root.dart
        - lib/src/dependency.dart
        - lib/src/viz_package.dart
      build_web_compilers|entrypoint:
        generate_for:
        - _example_src/**.dart
        release_options:
          compilers:
            dart2wasm:
              args:
                - -O4
                - --no-strip-wasm
            dart2js:
              args:
                - --stage=dump-info-all
                - --no-frequency-based-minification
                - --no-source-maps
                - -O4
      build_web_compilers|dart2js_archive_extractor:
        options:
          filter_outputs: false

      source_gen|combining_builder:
        options:
          ignore_for_file:
            - lines_longer_than_80_chars
